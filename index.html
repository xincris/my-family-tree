<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家族传承电子族谱</title>
    <style>
        :root {
            --primary-color: #8c7851; /* 沉稳的中式棕色 */
            --bg-color: #fdfaf5;      /* 宣纸底色 */
            --line-color: #d1c7b7;    /* 连线颜色 */
            --male-bg: #ffffff;
            --female-bg: #fffcf0;
        }

        body { 
            background-color: var(--bg-color); 
            font-family: "Microsoft YaHei", "SimSun", sans-serif; 
            margin: 0; 
            display: flex; 
            overflow-x: auto; /* 家族树太宽时可左右滚动 */
        }

        /* --- 家族树核心布局 --- */
        .tree-container { flex: 1; padding: 50px; display: flex; flex-direction: column; align-items: center; min-width: 1000px; }
        
        .tree ul { padding-top: 20px; position: relative; display: flex; justify-content: center; }
        .tree li { text-align: center; list-style-type: none; position: relative; padding: 20px 5px 0 5px; transition: all 0.5s; }

        /* 连线逻辑 CSS */
        .tree li::before, .tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 2px solid var(--line-color); width: 50%; height: 20px; }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid var(--line-color); }
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        .tree li:first-child::after { border-radius: 5px 0 0 0; }
        .tree li:last-child::before { border-right: 2px solid var(--line-color); border-radius: 0 5px 0 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
        .tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid var(--line-color); width: 0; height: 20px; }

        /* --- 成员卡片设计 --- */
        .couple { display: flex; justify-content: center; align-items: center; gap: 10px; position: relative; }
        
        .member-card {
            border: 1px solid var(--line-color);
            padding: 10px 15px;
            border-radius: 4px;
            background: var(--male-bg);
            cursor: pointer;
            transition: all 0.3s;
            min-width: 90px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: relative;
        }
        .member-card:hover { transform: translateY(-5px); border-color: var(--primary-color); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .name { font-weight: bold; font-size: 16px; color: #333; }
        .tag { font-size: 11px; color: #999; margin-top: 4px; }

        /* --- 三种特殊状态样式 --- */
        /* 1. 殁 (Deceased) */
        .member-card.deceased { filter: grayscale(100%); opacity: 0.7; background: #eee; border-style: dashed; }
        /* 2. 离 (Ex-spouse) */
        .member-card.ex-spouse { opacity: 0.4; border-style: dotted; transform: scale(0.9); }
        /* 3. 女性/配偶背景色微调 */
        .member-card.female { background: var(--female-bg); }

        /* 连接符 span */
        .spouse-link { font-size: 14px; color: var(--line-color); font-weight: bold; }
        .spouse-link.divorced { color: #ccc; font-weight: normal; }

        /* --- 侧边详情栏 --- */
        #sidebar {
            width: 320px; height: 100vh; background: #fff;
            position: fixed; right: -350px; top: 0;
            box-shadow: -10px 0 20px rgba(0,0,0,0.1);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 25px; box-sizing: border-box;
            z-index: 1000; border-left: 5px solid var(--primary-color);
        }
        #sidebar.active { right: 0; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #999; }
        .sidebar-photo { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px; display: block; object-fit: cover; background: #f0f0f0; border: 3px solid var(--line-color); }
        .info-item { margin-bottom: 15px; font-size: 14px; line-height: 1.6; }
        .info-label { font-weight: bold; color: var(--primary-color); margin-right: 5px; }

        /* 字辈展示区 */
        .generation-poem { margin-top: 20px; padding: 15px; border: 1px double var(--line-color); background: #fff; text-align: center; max-width: 600px; }
    </style>
</head>
<body>

<div class="tree-container">
    <h1 style="color:var(--primary-color); letter-spacing: 4px;">张氏家族传承电子族谱</h1>
    
    <div class="generation-poem">
        <p style="margin:0; font-size: 13px; color: #888;">【家族字辈】</p>
        <p style="margin:5px 0 0 0; letter-spacing: 5px; font-weight: bold;">世 德 光 昌 永 · 仁 义 礼 智 长</p>
    </div>

    <div class="tree">
        <ul>
            <li>
                <div class="couple">
                    <div class="member-card" onclick="openDetails('张世荣', '1900-1980', '重庆', '张氏家族入川始祖，为人厚道。', 'images/shirong.jpg')">
                        <div class="name">张世荣</div><div class="tag">始祖 (世字辈)</div>
                    </div>
                    <span class="spouse-link">配</span>
                    <div class="member-card female deceased" onclick="openDetails('王氏', '1905-1975', '成都', '勤俭持家。', 'images/wangshi.jpg')">
                        <div class="name">王氏</div><div class="tag">原配</div>
                    </div>
                </div>

                <ul>
                    <li>
                        <div class="member-card" onclick="openDetails('张德福', '1930-2010', '重庆', '务农为生，育有三子。', 'images/defu.jpg')">
                            <div class="name">张德福</div><div class="tag">长子 (德字辈)</div>
                        </div>
                    </li>
                    <li>
                        <div class="couple">
                            <div class="member-card" onclick="openDetails('张德寿', '1935-至今', '重庆', '退休干部。', 'images/deshou.jpg')">
                                <div class="name">张德寿</div><div class="tag">次子</div>
                            </div>
                            <span class="spouse-link divorced">/</span>
                            <div class="member-card female ex-spouse" onclick="openDetails('前母某氏', '1940-至今', '未知', '1970年离异。', '')">
                                <div class="name">刘氏</div><div class="tag">前配 (离)</div>
                            </div>
                            <span class="spouse-link">配</span>
                            <div class="member-card female" onclick="openDetails('陈氏', '1945-至今', '重庆', '现任配偶。', 'images/chenshi.jpg')">
                                <div class="name">陈氏</div><div class="tag">继配</div>
                            </div>
                        </div>

                        <ul>
                            <li>
                                <div class="member-card" onclick="openDetails('张光亮', '1965-至今', '深圳', '本次族谱录入发起人。', 'images/me.jpg')">
                                    <div class="name">张光亮</div><div class="tag">三代 (光字辈)</div>
                                </div>
                            </li>
                        </ul>
                    </li>
                </ul>
            </li>
        </ul>
    </div>
</div>

<div id="sidebar">
    <span class="close-btn" onclick="closeSidebar()">&times;</span>
    <img id="sd-photo" src="" alt="成员照片" class="sidebar-photo">
    <h2 id="sd-name" style="text-align:center; color:var(--primary-color); margin-top:0;">姓名</h2>
    <div class="info-item"><span class="info-label">生卒日期:</span><span id="sd-date"></span></div>
    <div class="info-item"><span class="info-label">原籍籍贯:</span><span id="sd-loc"></span></div>
    <hr style="border:0; border-top: 1px double var(--line-color); margin: 20px 0;">
    <div class="info-item"><span class="info-label">生平简介:</span><br><span id="sd-desc"></span></div>
</div>

<script>
    function openDetails(name, date, loc, desc, photoUrl) {
        document.getElementById('sd-name').innerText = name;
        document.getElementById('sd-date').innerText = date;
        document.getElementById('sd-loc').innerText = loc;
        document.getElementById('sd-desc').innerText = desc;
        
        // 处理照片路径：如果为空则显示默认图
        const photo = document.getElementById('sd-photo');
        photo.src = photoUrl || 'https://via.placeholder.com/120?text=暂无照片';
        
        document.getElementById('sidebar').classList.add('active');
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('active');
    }

    // 点击侧边栏以外区域关闭它
    window.onclick = function(event) {
        let sidebar = document.getElementById('sidebar');
        if (event.target == document.body) {
            sidebar.classList.remove('active');
        }
    }
</script>

</body>
</html>
