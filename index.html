<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>吴/牟/饶氏家族谱 - 精准连线版</title>
    <style>
        :root {
            --primary-color: #8c7851;
            --bg-color: #fdfaf5;
            --line-color: #d1c7b7;
        }

        body { background-color: var(--bg-color); font-family: "Microsoft YaHei", sans-serif; margin: 0; display: flex; overflow-x: auto; }
        .tree-container { flex: 1; padding: 60px; display: flex; flex-direction: column; align-items: center; }
        
        /* --- 家族树核心布局 --- */
        .tree ul { padding-top: 25px; position: relative; display: flex; justify-content: center; }
        .tree li { text-align: center; list-style-type: none; position: relative; padding: 25px 5px 0 5px; }

        /* 子女上方的水平横线 */
        .tree li::before, .tree li::after { 
            content: ''; position: absolute; top: 0; right: 50%; 
            border-top: 2px solid var(--line-color); width: 50%; height: 25px; 
        }
        .tree li::after { right: auto; left: 50%; border-left: 2px solid var(--line-color); }
        
        /* 只有单个子女时隐藏横线 */
        .tree li:only-child::after, .tree li:only-child::before { display: none; }
        .tree li:only-child { padding-top: 0; }
        
        /* 修正横线边缘 */
        .tree li:first-child::after { border-radius: 5px 0 0 0; }
        .tree li:last-child::before { border-right: 2px solid var(--line-color); border-radius: 0 5px 0 0; }
        .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }

        /* --- 关键：夫妻结合处的竖线 --- */
        .couple { 
            display: flex; justify-content: center; align-items: center; 
            gap: 10px; position: relative; padding-bottom: 25px; /* 为下方竖线留出空间 */
        }

        /* 在 couple 容器下方正中间画竖线 */
        .couple::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 25px; /* 竖线长度 */
            border-left: 2px solid var(--line-color);
        }

        /* 成员卡片 */
        .member-card {
            border: 1px solid var(--line-color); padding: 10px; border-radius: 4px;
            background: #fff; cursor: pointer; min-width: 90px; z-index: 2;
        }
        .name { font-weight: bold; font-size: 15px; }
        .tag { font-size: 11px; color: #999; }
        
        /* 状态类 */
        .deceased { filter: grayscale(100%); opacity: 0.7; border-style: dashed; }
        .ex-spouse { opacity: 0.5; border-style: dotted; }
        .spouse-link { font-size: 13px; color: var(--primary-color); font-weight: bold; z-index: 3; background: var(--bg-color); padding: 0 5px; }

        /* 详情侧边栏 */
        #sidebar {
            width: 300px; height: 100vh; background: #fff; position: fixed; right: -320px; top: 0;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.4s; padding: 30px; z-index: 1000;
        }
        #sidebar.active { right: 0; }
    </style>
</head>
<body>

<div class="tree-container">
    <h2 style="color:var(--primary-color)">家族传承谱 (结合线优化版)</h2>

    <div class="tree">
        <ul>
            <li>
                <div class="couple">
                    <div class="member-card deceased" onclick="openDetails('饶云寿', '已故', '生父')">
                        <div class="name">饶云寿</div><div class="tag">原配 (殁)</div>
                    </div>
                    <span class="spouse-link">配</span>
                    <div class="member-card" onclick="openDetails('牟方梅', '在世', '母亲')">
                        <div class="name">牟方梅</div><div class="tag">母亲</div>
                    </div>
                    <span class="spouse-link">现配</span>
                    <div class="member-card" onclick="openDetails('吴元贵', '在世', '继父')">
                        <div class="name">吴元贵</div><div class="tag">现配</div>
                    </div>
                </div>

                <ul>
                    <li>
                        <div class="couple">
                            <div class="member-card" onclick="openDetails('饶华东', '在世', '长子')">
                                <div class="name">饶华东</div><div class="tag">长子</div>
                            </div>
                            <span class="spouse-link">配</span>
                            <div class="member-card" onclick="openDetails('徐东英', '在世', '儿媳')">
                                <div class="name">徐东英</div><div class="tag">妻子</div>
                            </div>
                        </div>
                        <ul>
                            <li>
                                <div class="member-card"><div class="name">饶艳霞</div><div class="tag">孙女</div></div>
                            </li>
                        </ul>
                    </li>

                    <li>
                        <div class="couple">
                            <div class="member-card" onclick="openDetails('饶华莉', '在世', '长女')">
                                <div class="name">饶华莉</div><div class="tag">长女</div>
                            </div>
                            <span class="spouse-link" style="color:#ccc">离/</span>
                            <div class="member-card ex-spouse" onclick="openDetails('景晓东', '在世', '前夫')">
                                <div class="name">景晓东</div><div class="tag">前配</div>
                            </div>
                            <span class="spouse-link">现配</span>
                            <div class="member-card" onclick="openDetails('李家国', '在世', '现夫')">
                                <div class="name">李家国</div><div class="tag">现配</div>
                            </div>
                        </div>
                        <ul>
                            <li>
                                <div class="member-card"><div class="name">景鑫</div><div class="tag">外孙</div></div>
                            </li>
                        </ul>
                    </li>
                </ul>
            </li>
        </ul>
    </div>
</div>

<div id="sidebar">
    <span style="cursor:pointer;float:right" onclick="closeSidebar()">×</span>
    <h2 id="sd-name" style="margin-top:40px;"></h2>
    <p id="sd-desc"></p>
</div>

<script>
    function openDetails(name, status, desc) {
        document.getElementById('sd-name').innerText = name;
        document.getElementById('sd-desc').innerText = status + " | " + desc;
        document.getElementById('sidebar').classList.add('active');
    }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); }
</script>

</body>
</html>
